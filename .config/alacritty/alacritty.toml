[window]
opacity = 2

[font]
size = 6.5

[font.offset]
x = 0
y = 0

[font.normal]
family = "hack"
style = "RegularSolids"

[font.bold]
family = "hack"
style = "BoldSolids"

[font.italic]
family = "hack"
style = "RegularOutlinedCF"

[font.bold_italic]
family = "hack"
style = "FramedSolidsCF"

# Spider-Gwen — dark environment theme
# Deep void black bg, ghost-white fg, pink/teal/purple accents

[colors.primary]
foreground = "#f0eaf5"
background = "#0d0b12"

[colors.cursor]
text   = "#0d0b12"
cursor = "#ff6eb4"

[colors.normal]
black   = "#1a1820"
red     = "#e8829a"
green   = "#4ecdc4"
yellow  = "#e8b4c8"
blue    = "#9b8ec4"
magenta = "#ff6eb4"
cyan    = "#7ecac3"
white   = "#d8d0e8"

[colors.bright]
black   = "#3a3448"
red     = "#ff6b9d"
green   = "#5de8df"
yellow  = "#ffd6e8"
blue    = "#b8a9d9"
magenta = "#ff3da0"
cyan    = "#9de8e0"
white   = "#f5f0ff"

[keyboard]
bindings = [
  { key = "Equals", mods = "Super", action = "IncreaseFontSize" },
  { key = "Minus",  mods = "Super", action = "DecreaseFontSize" },
]
